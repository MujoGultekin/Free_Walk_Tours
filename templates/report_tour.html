{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow border-0">
            <div class="card-body p-4">
                <h3 class="fw-bold text-dark mb-2">Submit Post-Tour Operational Report</h3>
                <p class="text-muted small">Provide event metrics and attendance visual files validation logs.</p>
                <hr>
                <form method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Event Execution Date</label>
                        <input type="date" name="tour_date" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Actual Attended Participants Count</label>
                        <input type="number" name="actual_participants" class="form-control" min="0" required placeholder="e.g. 14">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Evidence Verification Photos (Upload between 1 to 5 files)</label>
                        <input type="file" name="evidence_photos" class="form-control" multiple accept="image/*" required>
                        <div class="form-text text-muted small">At least one visual evidence upload is strictly required for evaluation score.</div>
                    </div>
                    <button type="submit" class="btn btn-success w-100 fw-bold shadow-sm py-2 text-white">Upload Validation Log</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
